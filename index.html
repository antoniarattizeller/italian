<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Italian Course</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <button class="icon-button mobile-only" type="button" data-action="close-sidebar" aria-label="Close navigation">x</button>
        <div>
          <h1>Italian Course</h1>
          <p>Structured weekly practice</p>
        </div>
      </div>

      <nav class="sidebar-nav" aria-label="Course navigation">
        <button class="nav-item active" type="button" data-view="home">Course Home</button>
        <button class="nav-item" type="button" data-view="grammar">Grammar Overview</button>
        <button class="nav-item" type="button" data-view="quiz">Quiz Builder</button>
        <button class="nav-item" type="button" data-view="notebook">Personal Notebook</button>
      </nav>

      <div class="sidebar-section">
        <div class="sidebar-label">Weeks</div>
        <div id="week-nav"></div>
      </div>
    </aside>

    <div class="main-wrap">
      <header class="topbar">
        <button class="icon-button mobile-only" type="button" data-action="open-sidebar" aria-label="Open navigation">☰</button>
        <div>
          <div class="eyebrow">Impara l'italiano</div>
          <h2 id="view-title">Course Home</h2>
        </div>
      </header>

      <main class="content" id="app" tabindex="-1"></main>
    </div>
  </div>

  <div class="overlay" id="overlay" data-action="close-sidebar"></div>

  <script src="content/course.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
